<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Faste Rabatter</title>
<meta name="description" content="Søk opp rabatter fra DNB, OBOS, Elbilforeningen og USBL på ett sted." />

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Rabatter" />
<meta name="theme-color" content="#0b1220" />

<link rel="stylesheet" href="style.css" />

<!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "432f2f51feec49a7bac7787d9ec08fde"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>

<header class="topbar">
  <div class="topbar-row">
    <h1>Faste Rabatter</h1>
    <button
      type="button"
      id="settings-btn"
      class="settings-btn"
      aria-haspopup="dialog"
      aria-label="Velg hvilke leverandører du er medlem av"
    >⚙️ Mine medlemskap</button>
  </div>
  <p class="subtitle" id="subtitle">Laster …</p>
</header>

<div id="settings-overlay" class="overlay" hidden>
  <div class="settings-panel" role="dialog" aria-modal="true" aria-label="Mine medlemskap">
    <h2>Mine medlemskap</h2>
    <p class="settings-desc">
      Velg hvilke leverandører du er medlem av. Rabatter fra de andre skjules.
    </p>
    <div id="settings-list" class="settings-list">
      <!-- avkrysningsbokser injiseres av app.js -->
    </div>
    <button type="button" id="settings-close" class="settings-done">Ferdig</button>
  </div>
</div>

<main>
  <div class="search-wrap">
    <input
      id="search"
      type="search"
      inputmode="search"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      placeholder="Søk etter butikk, f.eks. Elkjøp"
      aria-label="Søk etter butikk"
    />
  </div>

  <div class="filters" id="filters" role="group" aria-label="Filtrer på leverandør">
    <!-- filter chips injected by app.js -->
  </div>

  <ul class="results" id="results" aria-live="polite">
    <!-- results injected by app.js -->
  </ul>

  <p class="empty-state" id="empty-state" hidden>Ingen rabatter funnet.</p>
</main>

<footer class="footer">
  <span id="updated-at"></span>
</footer>

<script src="app.js"></script>
</body>
</html>
